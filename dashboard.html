<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Dashboard · Jesmi & Jibin</title>
<style>
  :root{
    --ink:#1a0404;--ink-2:#2a0808;--gold:#b08d5b;--gold-hi:#d4b57a;--ivory:#f2e8d9;--line:rgba(176,141,91,.2);
    --red:#7a1010;--green:#2d6a4f;--micro:'Courier New',monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--ink);color:var(--ivory);font-family:Georgia,serif;min-height:100vh;}

  /* LOGIN */
  #loginScreen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:1.5rem;padding:2rem;}
  .login-mono{font-family:var(--micro);font-size:.5rem;letter-spacing:.55em;color:var(--gold);opacity:.7;}
  .login-title{font-style:italic;font-size:2rem;color:var(--ivory);text-align:center;}
  .login-sub{font-family:var(--micro);font-size:.45rem;letter-spacing:.4em;color:var(--gold);opacity:.6;}
  .login-box{border:1px solid var(--line);padding:2rem 1.5rem;width:100%;max-width:320px;display:flex;flex-direction:column;gap:1rem;background:rgba(255,255,255,.02);}
  .login-box input{background:transparent;border:none;border-bottom:1px solid var(--gold);color:var(--ivory);font-size:1rem;padding:.5rem;outline:none;letter-spacing:.1em;width:100%;}
  .login-box button{background:var(--gold);color:var(--ink);border:none;padding:.9rem;font-family:var(--micro);font-size:.6rem;letter-spacing:.4em;cursor:pointer;}
  .login-err{font-family:var(--micro);font-size:.45rem;letter-spacing:.3em;color:#e87;text-align:center;height:.8rem;}

  /* DASHBOARD */
  #dash{display:none;flex-direction:column;min-height:100vh;}
  .dash-top{background:var(--ink-2);border-bottom:1px solid var(--line);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
  .dash-brand{font-style:italic;font-size:1.3rem;color:var(--gold-hi);}
  .dash-sub{font-family:var(--micro);font-size:.42rem;letter-spacing:.35em;color:var(--gold);opacity:.7;}
  .dash-logout{font-family:var(--micro);font-size:.42rem;letter-spacing:.3em;color:var(--gold);opacity:.5;cursor:pointer;border:1px solid var(--line);padding:.3rem .7rem;background:none;}

  .dash-body{padding:1.2rem;display:flex;flex-direction:column;gap:1.4rem;max-width:700px;margin:0 auto;width:100%;}

  /* STATS */
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;}
  @media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr);}}
  .stat{border:1px solid var(--line);padding:1rem .8rem;text-align:center;background:rgba(255,255,255,.02);}
  .stat-n{font-size:2rem;font-style:italic;color:var(--gold-hi);line-height:1;}
  .stat-l{font-family:var(--micro);font-size:.4rem;letter-spacing:.35em;color:var(--gold);opacity:.7;margin-top:.4rem;}

  /* LINK GEN */
  .card{border:1px solid var(--line);padding:1.2rem;background:rgba(255,255,255,.02);}
  .card-title{font-family:var(--micro);font-size:.48rem;letter-spacing:.42em;color:var(--gold);margin-bottom:1rem;}
  .link-row{display:flex;gap:.5rem;flex-wrap:wrap;}
  .link-row input{flex:1;min-width:0;background:transparent;border:1px solid var(--line);color:var(--ivory);font-size:.9rem;padding:.6rem .8rem;outline:none;font-style:italic;}
  .link-row input:focus{border-color:var(--gold);}
  .link-out{font-family:var(--micro);font-size:.4rem;letter-spacing:.2em;color:var(--gold);opacity:.6;margin-top:.5rem;word-break:break-all;min-height:.9rem;}
  .btns-row{display:flex;gap:.5rem;margin-top:.6rem;flex-wrap:wrap;}

  /* GUEST LIST */
  .filters{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.8rem;}
  .fbtn{font-family:var(--micro);font-size:.42rem;letter-spacing:.3em;border:1px solid var(--line);background:none;color:var(--gold);padding:.4rem .8rem;cursor:pointer;opacity:.6;}
  .fbtn.active{background:var(--gold);color:var(--ink);opacity:1;}
  .guest-list{display:flex;flex-direction:column;gap:.5rem;}
  .g-card{border:1px solid var(--line);padding:.8rem 1rem;display:grid;grid-template-columns:1fr auto;gap:.3rem .8rem;align-items:start;}
  .g-name{font-style:italic;font-size:1rem;color:var(--ivory);}
  .g-badge{font-family:var(--micro);font-size:.4rem;letter-spacing:.28em;padding:.25rem .5rem;justify-self:end;}
  .g-badge.yes{background:rgba(45,106,79,.3);border:1px solid rgba(45,106,79,.5);color:#6fcf97;}
  .g-badge.no{background:rgba(122,16,16,.3);border:1px solid rgba(122,16,16,.5);color:#e87;}
  .g-meta{font-family:var(--micro);font-size:.38rem;letter-spacing:.22em;color:var(--gold);opacity:.55;grid-column:1/-1;}
  .g-msg{font-style:italic;font-size:.82rem;color:var(--ivory);opacity:.55;grid-column:1/-1;margin-top:.2rem;border-left:2px solid var(--line);padding-left:.6rem;}
  .empty{font-family:var(--micro);font-size:.45rem;letter-spacing:.3em;color:var(--gold);opacity:.4;text-align:center;padding:2rem;}

  /* BUTTONS */
  .btn{background:transparent;border:1px solid var(--gold);color:var(--gold);font-family:var(--micro);font-size:.45rem;letter-spacing:.32em;padding:.55rem 1rem;cursor:pointer;transition:background .2s;}
  .btn:hover{background:rgba(176,141,91,.12);}
  .btn.solid{background:var(--gold);color:var(--ink);}
  .btn.solid:hover{background:var(--gold-hi);}

  /* REALTIME DOT */
  .live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#6fcf97;margin-right:.4rem;animation:pulse 1.5s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .live-lbl{font-family:var(--micro);font-size:.38rem;letter-spacing:.3em;color:var(--gold);opacity:.55;display:flex;align-items:center;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-mono">DIGIWED · DASHBOARD</div>
  <div class="login-title">Jesmi <span style="opacity:.4">&</span> Jibin</div>
  <div class="login-sub">8 · JULY · 2026 · SHARJAH &amp; DUBAI</div>
  <div class="login-box">
    <input type="password" id="pwInput" placeholder="Enter password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()"/>
    <button onclick="doLogin()">ENTER DASHBOARD</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash">
  <div class="dash-top">
    <div>
      <div class="dash-brand">Jesmi <span style="opacity:.4">&</span> Jibin</div>
      <div class="dash-sub">✝ &nbsp;8 JULY 2026 · SHARJAH &amp; DUBAI, UAE</div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;">
      <div class="live-lbl"><span class="live-dot"></span>LIVE</div>
      <button class="dash-logout" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>

  <div class="dash-body">

    <!-- STATS -->
    <div class="stats">
      <div class="stat"><div class="stat-n" id="sTot">0</div><div class="stat-l">TOTAL RSVPs</div></div>
      <div class="stat"><div class="stat-n" id="sAtt">0</div><div class="stat-l">ATTENDING</div></div>
      <div class="stat"><div class="stat-n" id="sGuests">0</div><div class="stat-l">TOTAL GUESTS</div></div>
      <div class="stat"><div class="stat-n" id="sNo">0</div><div class="stat-l">NOT ATTENDING</div></div>
    </div>

    <!-- PERSONALISED LINK -->
    <div class="card">
      <div class="card-title">◈ &nbsp;PERSONALISED GUEST LINK</div>
      <div class="link-row">
        <input type="text" id="guestNameInput" placeholder="Guest name…" oninput="buildLink()"/>
        <button class="btn solid" onclick="copyLink()">COPY</button>
        <button class="btn" onclick="waLink()">WHATSAPP</button>
      </div>
      <div class="link-out" id="linkOut"></div>
    </div>

    <!-- EXPORT -->
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn" onclick="exportCSV()">↓ &nbsp;EXPORT CSV</button>
    </div>

    <!-- GUEST LIST -->
    <div class="card">
      <div class="card-title">◈ &nbsp;RSVP RESPONSES</div>
      <div class="filters">
        <button class="fbtn active" data-f="all"  onclick="setFilter('all',this)">ALL</button>
        <button class="fbtn"       data-f="yes"  onclick="setFilter('yes',this)">ATTENDING</button>
        <button class="fbtn"       data-f="no"   onclick="setFilter('no',this)">NOT ATTENDING</button>
      </div>
      <div class="guest-list" id="guestList">
        <div class="empty">LOADING…</div>
      </div>
    </div>

  </div>
</div>

<!-- Firebase Compat SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const PASSWORD = 'jesmijibin2026';
const RSVP_PATH = 'jesmi-jibin/rsvp';
const BASE_URL  = 'https://digiwed161-sys.github.io/Jesmi_weds_jebin/';

firebase.initializeApp({
  apiKey:            "AIzaSyB41fvxvl1KeHOro6WKJ72o22izuCpJ-b4",
  authDomain:        "yaseen-jumana-wedding.firebaseapp.com",
  databaseURL:       "https://yaseen-jumana-wedding-default-rtdb.firebaseio.com",
  projectId:         "yaseen-jumana-wedding",
  storageBucket:     "yaseen-jumana-wedding.firebasestorage.app",
  messagingSenderId: "355557621111",
  appId:             "1:355557621111:web:d0b78c34bfe5a53b69f572"
});
const db = firebase.database();

// ── LOGIN ──
function doLogin(){
  const v = document.getElementById('pwInput').value;
  if(v === PASSWORD){
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('dash').style.display='flex';
    startListen();
  } else {
    document.getElementById('loginErr').textContent='Incorrect password';
    setTimeout(()=>document.getElementById('loginErr').textContent='',2000);
  }
}
function doLogout(){
  location.reload();
}

// ── DATA ──
let allRsvps = [];
let currentFilter = 'all';

function startListen(){
  db.ref(RSVP_PATH).on('value', snap => {
    allRsvps = [];
    snap.forEach(child => {
      allRsvps.push({ key: child.key, ...child.val() });
    });
    allRsvps.sort((a,b) => (b.ts||0) - (a.ts||0));
    updateStats();
    renderList();
  });
}

function updateStats(){
  const att = allRsvps.filter(r => r.attending === 'yes');
  const no  = allRsvps.filter(r => r.attending === 'no');
  const guests = att.reduce((s,r) => s + (parseInt(r.members)||1), 0);
  document.getElementById('sTot').textContent    = allRsvps.length;
  document.getElementById('sAtt').textContent    = att.length;
  document.getElementById('sGuests').textContent = guests;
  document.getElementById('sNo').textContent     = no.length;
}

function setFilter(f, btn){
  currentFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList(){
  const list = document.getElementById('guestList');
  let data = allRsvps;
  if(currentFilter !== 'all') data = data.filter(r => r.attending === currentFilter);
  if(!data.length){
    list.innerHTML = '<div class="empty">NO RESPONSES YET</div>';
    return;
  }
  list.innerHTML = data.map(r => {
    const isYes = r.attending === 'yes';
    const badge = isYes
      ? '<span class="g-badge yes">ATTENDING</span>'
      : '<span class="g-badge no">NOT ATTENDING</span>';
    const guestLine = isYes && r.members ? `· ${r.members} guest${r.members>1?'s':''}` : '';
    const msgLine   = r.msg ? `<div class="g-msg">"${r.msg}"</div>` : '';
    const time      = r.ts ? new Date(r.ts).toLocaleString('en-IN',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="g-card">
      <div class="g-name">${r.name||'—'}</div>
      ${badge}
      <div class="g-meta">${time} ${guestLine}</div>
      ${msgLine}
    </div>`;
  }).join('');
}

// ── PERSONALISED LINK ──
function buildLink(){
  const name = document.getElementById('guestNameInput').value.trim();
  const url  = name ? BASE_URL + '?guest=' + encodeURIComponent(name) : '';
  document.getElementById('linkOut').textContent = url;
  return url;
}
function copyLink(){
  const url = buildLink();
  if(!url) return;
  navigator.clipboard.writeText(url).then(()=>{
    const btn = event.target;
    btn.textContent = 'COPIED!';
    setTimeout(()=>btn.textContent='COPY', 1500);
  });
}
function waLink(){
  const name = document.getElementById('guestNameInput').value.trim();
  if(!name) return;
  const url = buildLink();
  const msg = `Dear ${name},%0A%0AWe joyfully invite you to celebrate the wedding of%0AJesmi %26 Jibin%0A%0A🥂 Wedding Reception · 8 July 2026%0AQueen Elizabeth 2, Port Rashid, Dubai%0A%0AYour personal invitation:%0A${encodeURIComponent(url)}`;
  window.open('https://wa.me/?text=' + msg, '_blank');
}

// ── CSV EXPORT ──
function exportCSV(){
  if(!allRsvps.length) return;
  const rows = [['Name','Attending','Guests','Message','Time']];
  allRsvps.forEach(r => {
    const time = r.ts ? new Date(r.ts).toLocaleString('en-IN') : '';
    rows.push([r.name||'', r.attending||'', r.members||'', (r.msg||'').replace(/,/g,' '), time]);
  });
  const csv = rows.map(r => r.map(v=>`"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'jesmi-jibin-rsvp.csv';
  a.click();
}
</script>
</body>
</html>
